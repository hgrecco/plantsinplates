[project]
authors = ["Hernan Grecco <hgrecco@gmail.com>"]
channels = ["https://prefix.dev/conda-forge", "conda-forge"]
name = "Datos VAMP721"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]
show-version = "python plantsinplates-app version"
gui = "python plantsinplates-app gui"
gui-dev = "python __main__.py gui"
test = "python __main__.py test"

build = "python -m zipfile -c plantsinplates-app __main__.py pixi.toml pixi.lock plantsinplates"
upload = "scp plantsinplates-app df:/home/hgrecco/html/pkg"
publish = [{ task = "build" }, { task = "upload" }]

update = "python plantsinplates-app update;mv .tmp.new_version plantsinplates-app"
update-app = [
  { task = "show-version" },
  { task = "update" },
  { task = "show-version" },
]


[dependencies]
python = "==3.12"
ipykernel = "*"
jupyter = ">=1.1.1,<2"
scikit-image = ">=0.25.1,<0.26"
numpy = ">=2.2.3,<3"
scipy = ">=1.15.2,<2"
matplotlib = ">=3.10.0,<4"
pandas = ">=2.2.3,<3"
openpyxl = ">=3.1.5,<4"
seaborn = ">=0.13.2,<0.14"
typer = ">=0.16.0,<0.17"

[pypi-dependencies]
bioio = ">=0.0.1, <0.0.2"
bioio-czi = ">=1.0.2, <2"
bioio-ome-tiff = ">=1.0.1, <2"
pandas-stubs = "*"
matplotlib-stubs = "*"
scipy-stubs = "*"

[environments]
lint = { features = ["lint"], no-default-feature = true }

[feature.lint.dependencies]
python = "==3.12"
pre-commit = "*"
pre-commit-hooks = "*"
taplo = "*"
ruff = "*"
mdformat = "*"
mdformat-ruff = "*"

[feature.lint.tasks]
pre-commit-install = "pre-commit install"
lint = "pre-commit run"

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
extend-select = ["I"]
